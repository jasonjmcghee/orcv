name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 0.2.0)"
        required: true
        type: string

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        run: |
          if [ -n "${{ env.VERSION }}" ]; then
            echo "VERSION=${{ env.VERSION }}" >> "$GITHUB_ENV"
          else
            # Strip leading "v" from the tag name.
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          fi

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          CERT_FILE=$(mktemp /tmp/cert.XXXXXX.p12)
          KEYCHAIN_FILE="/tmp/build-$(uuidgen).keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_FILE"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_FILE"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"

          security import "$CERT_FILE" -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_FILE"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security list-keychains -d user -s "$KEYCHAIN_FILE" login.keychain-db

          echo "KEYCHAIN_FILE=$KEYCHAIN_FILE" >> "$GITHUB_ENV"

      - name: Build signed app
        run: |
          set -euo pipefail

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_FILE" \
            | sed -n 's/.*"\(.*\)"/\1/p' \
            | grep '^Developer ID Application:' \
            | head -n 1)"

          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "error: no Developer ID Application signing identity found in imported keychain" >&2
            security find-identity -v -p codesigning "$KEYCHAIN_FILE" || true
            exit 1
          fi

          echo "Using signing identity: $SIGNING_IDENTITY"

          xcodebuild \
            -project orcv.xcodeproj \
            -scheme orcv \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_FILE --options=runtime" \
            build

          ditto build/DerivedData/Build/Products/Release/orcv.app build/orcv.app

          if ! codesign -dv --verbose=4 build/orcv.app 2>&1 | grep -q '^Authority='; then
            echo "error: expected certificate-signed app, but no signing authority was found" >&2
            exit 1
          fi

          # Verify hardened runtime flag is set (required for notarization).
          if ! codesign -dv --verbose=4 build/orcv.app 2>&1 | grep -q 'runtime'; then
            echo "error: hardened runtime flag not set on signed app" >&2
            exit 1
          fi

      - name: Notarize app
        env:
          NOTARIZE_APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID }}
          NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD }}
          NOTARIZE_TEAM_ID: ${{ secrets.NOTARIZE_TEAM_ID }}
        run: |
          set -euo pipefail

          ditto -c -k --keepParent build/orcv.app build/orcv-notarize.zip

          echo "Submitting app for notarization..."
          xcrun notarytool submit build/orcv-notarize.zip \
            --apple-id "$NOTARIZE_APPLE_ID" \
            --password "$NOTARIZE_PASSWORD" \
            --team-id "$NOTARIZE_TEAM_ID" \
            --wait \
            --timeout 30m \
            --output-format json | tee build/notary-app-result.json

          APP_NOTARY_ID="$(plutil -extract id raw -o - build/notary-app-result.json)"
          APP_NOTARY_STATUS="$(plutil -extract status raw -o - build/notary-app-result.json)"
          echo "App notarization status: $APP_NOTARY_STATUS (id: $APP_NOTARY_ID)"

          if [ "$APP_NOTARY_STATUS" != "Accepted" ]; then
            echo "::error::App notarization failed with status $APP_NOTARY_STATUS (id: $APP_NOTARY_ID)"
            xcrun notarytool log "$APP_NOTARY_ID" \
              --apple-id "$NOTARIZE_APPLE_ID" \
              --password "$NOTARIZE_PASSWORD" \
              --team-id "$NOTARIZE_TEAM_ID" \
              --output-format json | tee build/notary-app-log.json || true
            exit 1
          fi

          echo "Stapling app notarization ticket..."
          xcrun stapler staple build/orcv.app
          xcrun stapler validate build/orcv.app
          rm -f build/orcv-notarize.zip

      - name: Create DMG
        run: |
          test -f "$PWD/assets/dmg/.DS_Store"
          chmod +x ./create_dmg.sh
          ./create_dmg.sh \
            "$PWD/build/orcv.app" \
            "$PWD/build/orcv-${{ env.VERSION }}.dmg" \
            "orcv"

      - name: Notarize DMG
        env:
          NOTARIZE_APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID }}
          NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD }}
          NOTARIZE_TEAM_ID: ${{ secrets.NOTARIZE_TEAM_ID }}
        run: |
          set -euo pipefail

          echo "Submitting DMG for notarization..."
          xcrun notarytool submit "build/orcv-${{ env.VERSION }}.dmg" \
            --apple-id "$NOTARIZE_APPLE_ID" \
            --password "$NOTARIZE_PASSWORD" \
            --team-id "$NOTARIZE_TEAM_ID" \
            --wait \
            --timeout 30m \
            --output-format json | tee build/notary-dmg-result.json

          DMG_NOTARY_ID="$(plutil -extract id raw -o - build/notary-dmg-result.json)"
          DMG_NOTARY_STATUS="$(plutil -extract status raw -o - build/notary-dmg-result.json)"
          echo "DMG notarization status: $DMG_NOTARY_STATUS (id: $DMG_NOTARY_ID)"

          if [ "$DMG_NOTARY_STATUS" != "Accepted" ]; then
            echo "::error::DMG notarization failed with status $DMG_NOTARY_STATUS (id: $DMG_NOTARY_ID)"
            xcrun notarytool log "$DMG_NOTARY_ID" \
              --apple-id "$NOTARIZE_APPLE_ID" \
              --password "$NOTARIZE_PASSWORD" \
              --team-id "$NOTARIZE_TEAM_ID" \
              --output-format json | tee build/notary-dmg-log.json || true
            exit 1
          fi

          echo "Stapling DMG notarization ticket..."
          xcrun stapler staple "build/orcv-${{ env.VERSION }}.dmg"
          xcrun stapler validate "build/orcv-${{ env.VERSION }}.dmg"

      - name: Verify DMG root contents
        run: |
          set -euo pipefail
          MNT="$(mktemp -d /tmp/orcv-dmg-verify.XXXXXX)"
          hdiutil attach "$PWD/build/orcv-${{ env.VERSION }}.dmg" -mountpoint "$MNT" -nobrowse -quiet
          ls -la "$MNT"
          test -d "$MNT/orcv.app"
          test -L "$MNT/Applications"
          hdiutil detach "$MNT" -quiet
          rmdir "$MNT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ env.VERSION }}" \
            build/orcv-${{ env.VERSION }}.dmg \
            --title "orcv v${{ env.VERSION }}" \
            --generate-notes

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_FILE:-}" ]; then
            security delete-keychain "$KEYCHAIN_FILE"
          fi
